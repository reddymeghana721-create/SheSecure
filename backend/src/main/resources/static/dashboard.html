<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SheSecure | Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body{font-family:'DM Sans',sans-serif;background:#f8f3ff;margin:0;padding:20px;}
    .container{max-width:900px;margin:auto;}
    .topbar{display:flex;justify-content:space-between;align-items:center;background:white;padding:15px;border-radius:15px;}
    .grid{display:grid;grid-template-columns:1fr 320px;gap:20px;margin-top:20px;}
    .card{background:white;padding:20px;border-radius:15px;}
    button{margin:5px;padding:10px;border:none;border-radius:10px;background:#8b5cf6;color:white;cursor:pointer;}
    #map{height:300px;border-radius:12px;margin-top:10px;}
  </style>
</head>

<body>

<div class="container">

  <div class="topbar">
    <h2>SheSecure Dashboard</h2>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="grid">

    <!-- LEFT -->
    <div class="card">
      <h3>Welcome <span id="userName"></span></h3>

      <div id="map"></div>

      <button onclick="startTracking()">📍 Start Tracking</button>
      <button onclick="triggerSOS()">🚨 SOS</button>
      <button onclick="fakeCall()">📞 Fake Call</button>
      <button onclick="playSiren()">🔊 Siren</button>

      <p>Email: <span id="userEmail"></span></p>
      <p>Phone: <span id="userPhone"></span></p>
    </div>

    <!-- RIGHT -->
    <div class="card">
      <h3>Trusted Contact</h3>
      <p id="trustedInfo">No trusted contact</p>
    </div>

  </div>

</div>

<audio id="siren" src="sounds/siren.mp3"></audio>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

<script>
const currentUser = requireLogin();
if (!currentUser) return;

// USER INFO
document.getElementById("userName").textContent = currentUser.name || "User";
document.getElementById("userEmail").textContent = currentUser.email || "-";
document.getElementById("userPhone").textContent = currentUser.phone || "-";

// TRUSTED CONTACT
<div class="card">
  <h3>Trusted Contacts</h3>

  <!-- ADD CONTACT -->
  <input id="contactName" placeholder="Name" />
  <input id="contactPhone" placeholder="Phone" />
  <button onclick="addContact()">Add Contact</button>

  <!-- CONTACT LIST -->
  <ul id="contactList"></ul>
</div>
// MAP INIT
let map = L.map('map').setView([18.52, 73.85], 13);
let marker;

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
  .addTo(map);

// TRACKING
function startTracking(){
  navigator.geolocation.watchPosition(pos=>{
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    if(!marker){
      marker = L.marker([lat, lon]).addTo(map);
    } else {
      marker.setLatLng([lat, lon]);
    }

    map.setView([lat, lon], 15);

    // send to backend
    fetch("/api/location", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        userId: currentUser.id,
        latitude: lat,
        longitude: lon
      })
    });
  });
}

// SOS
async function triggerSOS() {
  try {
    // 1. Get location
    navigator.geolocation.getCurrentPosition(async (pos) => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      const locationLink = `https://maps.google.com/?q=${lat},${lon}`;

      // 2. Get contacts
      const res = await fetch(`/api/contacts/${currentUser.id}`);
      const contacts = await res.json();

      if (!contacts.length) {
        alert("No contacts found!");
        return;
      }

      // 3. Send SOS to backend
      await fetch("/api/sos", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          userId: currentUser.id,
          latitude: lat,
          longitude: lon,
          triggered_by: "button"
        })
      });

      // 4. Simulate sending to contacts (frontend)
      contacts.forEach(c => {
        console.log(`Sending SOS to ${c.name}: ${locationLink}`);
      });

      // 5. UI feedback
      showSOSPopup(contacts.length, locationLink);

      // 6. Siren
      playSiren();
    });

  } catch (err) {
    alert("SOS failed");
  }
}

// SIREN
function playSiren(){
  document.getElementById("siren").play();
}

// FAKE CALL
function fakeCall(){
  let call = document.createElement("div");
  call.style = `
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:black;color:white;display:flex;
    flex-direction:column;align-items:center;justify-content:center;
    z-index:9999;
  `;

  call.innerHTML = `
    <h1>Mom ❤️</h1>
    <h2 id="timer">00:00</h2>
    <button onclick="this.parentElement.remove()">End Call</button>
  `;

  document.body.appendChild(call);

  let sec=0;
  setInterval(()=>{
    sec++;
    let m=String(Math.floor(sec/60)).padStart(2,'0');
    let s=String(sec%60).padStart(2,'0');
    call.querySelector("#timer").innerText = m+":"+s;
  },1000);
}
function showSOSPopup(count, link) {
  const popup = document.getElementById("sosPopup");
  const details = document.getElementById("sosDetails");

  details.innerHTML = `
    Sent to ${count} contacts <br>
    <a href="${link}" target="_blank" style="color:#0af;">View Location</a>
  `;

  popup.style.display = "block";

  setTimeout(() => {
    popup.style.display = "none";
  }, 5000);
}
</script>
<div id="sosPopup" style="
  display:none;
  position:fixed;
  top:20px;
  right:20px;
  background:#111;
  color:white;
  padding:15px;
  border-radius:12px;
  z-index:9999;
">
  🚨 SOS Sent!
  <div id="sosDetails"></div>
</div>
</body>
</html>
