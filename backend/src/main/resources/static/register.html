<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SheSecure | Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand: #8b5cf6;
      --accent: #ec4899;
      --surface: #ffffff;
      --bg: #fef2ff;
      --text: #2d1458;
      --muted: #7c3aed;
      --border: rgba(139,92,246,0.15);
      --shadow: 0 18px 40px rgba(139,92,246,0.14);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:linear-gradient(180deg,rgba(255,249,255,0.94),#fdf2f8),radial-gradient(circle at top left,#f9e3ff,transparent 28%),radial-gradient(circle at bottom right,rgba(236,72,153,0.16),transparent 24%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:26px;}
    .panel{width:100%;max-width:520px;background:var(--surface);border:1px solid var(--border);border-radius:28px;box-shadow:var(--shadow);overflow:hidden;}
    .hero{padding:34px 30px 18px;text-align:center;background:linear-gradient(135deg,rgba(139,92,246,0.08),rgba(236,72,153,0.08));}
    .hero h1{font-size:2rem;color:var(--brand);margin-bottom:8px;}
    .hero p{color:var(--muted);font-size:.96rem;}
    .card{padding:28px 30px 32px;}
    .field{margin-bottom:18px;}
    .field label{display:block;font-size:.78rem;font-weight:700;color:var(--brand);margin-bottom:8px;text-transform:uppercase;letter-spacing:.08em;}
    .field input{width:100%;padding:14px 16px;border:1px solid rgba(139,92,246,0.18);border-radius:14px;background:#fff;color:var(--text);font-size:.95rem;outline:none;transition:all .2s;}
    .field input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(236,72,153,0.08);}
    .field span{display:block;color:#6d28d9;font-size:.8rem;margin-top:6px;}
    .field-error{color:#ef4444;font-size:.9rem;margin-top:6px;min-height:20px;}
    .button{width:100%;padding:14px 18px;border:none;border-radius:14px;background:linear-gradient(135deg,#ec4899,#8b5cf6);color:#fff;font-weight:700;font-size:1rem;cursor:pointer;transition:transform .2s,box-shadow .2s;}
    .button:hover{transform:translateY(-1px);box-shadow:0 14px 30px rgba(236,72,153,0.2);}
    .footer{text-align:center;margin-top:18px;font-size:.93rem;color:var(--muted);}
    .footer a{color:var(--brand);font-weight:700;text-decoration:none;}
    .footer a:hover{text-decoration:underline;}
  </style>
</head>
<body>
  <div class="panel">
    <div class="hero">
      <h1>SheSecure</h1>
      <p>Create your account and keep your safety network ready.</p>
    </div>
    <div class="card">
      <form id="registerForm">
        <div class="field">
          <label for="name">Full name</label>
          <input type="text" id="name" name="name" placeholder="Priya Sharma" required />
          <div class="field-error" id="nameError"></div>
        </div>
        <div class="field">
          <label for="phone">Phone number</label>
          <input type="text" id="phone" name="phone" placeholder="+91-9876543210" required />
          <div class="field-error" id="phoneError"></div>
        </div>
        <div class="field">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />
          <div class="field-error" id="emailError"></div>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="At least 8 characters" required />
          <div class="field-error" id="passwordError"></div>
          <span>Use an uppercase letter and a number.</span>
        </div>
        <div class="field">
          <label for="trustedContact">Trusted contact (optional)</label>
          <input type="text" id="trustedContact" name="trustedContact" placeholder="Sister, friend or parent" />
          <span>This is kept locally in your browser for now.</span>
        </div>
        <div class="error-text" id="registerError"></div>
        <button type="submit" class="button">Create account</button>
      </form>
      <div class="footer">Already have an account? <a href="login.html">Login</a></div>
    </div>
  </div>
  <script src="app.js"></script>
  <script>
    const form = document.getElementById('registerForm');
    const errorEl = document.getElementById('registerError');
    const nameError = document.getElementById('nameError');
    const phoneError = document.getElementById('phoneError');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');

    function clearErrors() {
      errorEl.textContent = '';
      [nameError, phoneError, emailError, passwordError].forEach(el => el.textContent = '');
    }

    function setFieldError(element, message) {
      element.textContent = message;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      clearErrors();

      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const trustedContact = document.getElementById('trustedContact').value.trim();

      const phonePattern = /^\+91[- ]?[0-9]{10}$/;
      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const passwordPattern = /^(?=.*[A-Z])(?=.*\d).{8,}$/;
      let valid = true;

      if (name.length < 3) { setFieldError(nameError, 'Enter a valid name.'); valid = false; }
      if (!phonePattern.test(phone)) { setFieldError(phoneError, 'Use format +91-9876543210.'); valid = false; }
      if (!emailPattern.test(email)) { setFieldError(emailError, 'Enter a valid email address.'); valid = false; }
      if (!passwordPattern.test(password)) { setFieldError(passwordError, 'Password needs 8+ chars, uppercase and number.'); valid = false; }
      if (!valid) return;

      try {
        const user = await apiRegisterUser({ name, email, password, phone });
        localStorage.setItem('trustedContact', trustedContact);
        window.location.href = 'login.html';
      } catch (error) {
        errorEl.textContent = error.message || 'Unable to register. Please try again later.';
      }
    });
  </script>
</body>
</html>
