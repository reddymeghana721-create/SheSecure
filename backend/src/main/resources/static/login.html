<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SheSecure | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand: #8b5cf6;
      --accent: #ec4899;
      --surface: #ffffff;
      --bg: #fdf2f8;
      --text: #2d1458;
      --muted: #7c3aed;
      --border: rgba(139,92,246,0.15);
      --shadow: 0 18px 40px rgba(139,92,246,0.14);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:linear-gradient(180deg,rgba(248,244,255,0.95),#fdf2f8),radial-gradient(circle at top left,#f9e3ff,transparent 32%),radial-gradient(circle at bottom right,rgba(236,72,153,0.16),transparent 26%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:24px;}
    .panel{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);border-radius:28px;box-shadow:var(--shadow);overflow:hidden;}
    .hero{padding:32px 28px 20px;text-align:center;background:linear-gradient(135deg,rgba(139,92,246,0.08),rgba(236,72,153,0.08));}
    .hero h1{font-size:2.1rem;color:var(--brand);letter-spacing:-0.04em;margin-bottom:10px;}
    .hero p{color:var(--muted);font-size:0.95rem;}
    .card{padding:28px 28px 32px;}
    .field{margin-bottom:18px;}
    .field label{display:block;font-size:.78rem;font-weight:700;color:var(--brand);margin-bottom:8px;text-transform:uppercase;letter-spacing:.08em;}
    .field input{width:100%;padding:14px 16px;border:1px solid rgba(139,92,246,0.18);border-radius:14px;background:#fff;color:var(--text);font-size:.95rem;outline:none;transition:all .2s;}
    .field input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(236,72,153,0.08);}
    .error-text{color:#ef4444;font-size:.9rem;margin-top:6px;min-height:20px;}
    .actions{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
    .actions a{font-size:.85rem;color:var(--accent);text-decoration:none;}
    .actions a:hover{text-decoration:underline;}
    .button{width:100%;padding:14px 18px;border:none;border-radius:14px;background:linear-gradient(135deg,#ec4899,#8b5cf6);color:#fff;font-weight:700;font-size:1rem;cursor:pointer;transition:transform .2s,box-shadow .2s;}
    .button:hover{transform:translateY(-1px);box-shadow:0 14px 30px rgba(236,72,153,0.2);}
    .footer{text-align:center;margin-top:18px;font-size:.92rem;color:var(--muted);}
    .footer a{color:var(--brand);font-weight:700;text-decoration:none;}
    .footer a:hover{text-decoration:underline;}
  </style>
</head>
<body>
  <div class="panel">
    <div class="hero">
      <h1>SheSecure</h1>
      <p>Sign in to access your safety dashboard.</p>
    </div>
    <div class="card">
      <form id="loginForm">
        <div class="field">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required />
        </div>
        <div class="error-text" id="loginError"></div>
        <button type="submit" class="button">Login securely</button>
      </form>
      <div class="footer">Don't have an account? <a href="register.html">Create one</a></div>
    </div>
  </div>
  <script src="app.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('loginError');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorEl.textContent = '';
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        errorEl.textContent = 'Please enter both email and password.';
        return;
      }

      try {
        const user = await apiLoginUser(email, password);
        if (!user || !user.id) {
          errorEl.textContent = 'Email or password is incorrect.';
          return;
        }
        setCurrentUser(user);
        window.location.href = 'dashboard.html';
      } catch (error) {
        errorEl.textContent = error.message || 'Unable to login. Please try again.';
      }
    });
  </script>
</body>
</html>
