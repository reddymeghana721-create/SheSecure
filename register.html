<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SheSecure – Create Account</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --rose:   #f43f7e;
    --pink:   #ec4899;
    --mauve:  #c084fc;
    --purple: #8b5cf6;
    --deep:   #4c1d95;
    --blush:  #fdf2f8;
    --card:   rgba(255,255,255,0.85);
    --shadow: 0 20px 60px rgba(196,77,143,0.18);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    background: var(--blush);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 5% 15%, rgba(244,63,126,0.16) 0%, transparent 65%),
      radial-gradient(ellipse 50% 55% at 95% 85%, rgba(139,92,246,0.14) 0%, transparent 65%),
      radial-gradient(ellipse 35% 35% at 55% 45%, rgba(192,132,252,0.08) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  .shape { position: fixed; border-radius: 50%; filter: blur(1px); opacity: 0.1; pointer-events: none; z-index: 0; animation: floatShape 9s ease-in-out infinite; }
  .shape-1 { width: 200px; height: 200px; background: var(--rose); top: -3%; right: 5%; animation-delay: 0s; }
  .shape-2 { width: 100px; height: 100px; background: var(--purple); bottom: 15%; left: -2%; animation-delay: -4s; }
  .shape-3 { width: 60px; height: 60px; background: var(--mauve); top: 45%; right: -1%; animation-delay: -7s; }
  @keyframes floatShape { 0%,100%{ transform: translateY(0) rotate(0); } 50%{ transform: translateY(-18px) rotate(6deg); } }

  .page { position: relative; z-index: 1; width: 100%; max-width: 480px; }

  /* ── Brand ── */
  .brand {
    display: flex; align-items: center; gap: 12px;
    justify-content: center;
    margin-bottom: 24px;
    animation: fadeDown 0.5s ease both;
  }
  .brand-shield {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, var(--rose), var(--purple));
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    box-shadow: 0 6px 18px rgba(244,63,126,0.35);
  }
  .brand-text h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--rose), var(--purple));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .brand-text p { font-size: 0.73rem; color: #9b6fa5; margin-top: 1px; }

  /* ── Progress strip ── */
  .progress-strip {
    display: flex; align-items: center; gap: 0;
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(236,72,153,0.15);
    border-radius: 16px;
    padding: 10px 16px;
    margin-bottom: 20px;
    animation: fadeDown 0.5s ease 0.1s both;
  }
  .prog-step {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    font-size: 0.68rem; color: #c4b5d4; font-weight: 500;
    position: relative;
  }
  .prog-step::after {
    content: '';
    position: absolute; top: 12px; left: calc(50% + 12px);
    width: calc(100% - 24px); height: 1px;
    background: #e9d5ff;
  }
  .prog-step:last-child::after { display: none; }
  .prog-dot {
    width: 24px; height: 24px; border-radius: 50%;
    background: #e9d5ff;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; color: #c084fc; margin-bottom: 4px;
    transition: all 0.3s;
  }
  .prog-step.active .prog-dot { background: linear-gradient(135deg,var(--rose),var(--purple)); color: white; box-shadow: 0 3px 10px rgba(244,63,126,0.3); }
  .prog-step.active { color: var(--purple); }

  /* ── Card ── */
  .card {
    background: var(--card);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 28px;
    padding: 28px 24px;
    box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.9);
    border: 1px solid rgba(255,255,255,0.7);
    animation: fadeUp 0.6s ease 0.15s both;
    margin-bottom: 16px;
  }

  .section-heading {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 20px; padding-bottom: 12px;
    border-bottom: 1px solid #f3e8ff;
  }
  .section-icon {
    width: 36px; height: 36px; border-radius: 12px;
    background: linear-gradient(135deg, rgba(244,63,126,0.12), rgba(139,92,246,0.12));
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
  }
  .section-heading h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem; font-weight: 700; color: #2d1458;
  }
  .section-heading p { font-size: 0.72rem; color: #9b6fa5; margin-top: 1px; }

  /* ── Fields ── */
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 0.75rem; font-weight: 600;
    color: #7c3aed;
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .input-wrap { position: relative; }
  .input-wrap .fi {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    color: #c084fc; font-size: 0.85rem;
  }
  .field input {
    width: 100%;
    padding: 11px 38px 11px 36px;
    border: 1.5px solid #e9d5ff;
    border-radius: 13px;
    background: rgba(255,255,255,0.8);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem; color: #2d1458;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus { border-color: var(--pink); box-shadow: 0 0 0 3px rgba(236,72,153,0.1); background: #fff; }
  .field input::placeholder { color: #c4b5d4; }
  .field input.error { border-color: #f43f7e !important; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
  .field input.shake { animation: shake 0.3s linear; }

  .field-error { font-size: 0.73rem; color: #f43f7e; margin-top: 4px; min-height: 16px; display: flex; align-items: center; gap: 4px; }
  .field-error::before { content: '⚠'; font-size: 0.7rem; }
  .field-error:empty::before { display: none; }

  .eye-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #c084fc; cursor: pointer; font-size: 0.85rem; background: none; border: none; transition: color 0.2s; }
  .eye-btn:hover { color: var(--pink); }

  /* ── Optional badge ── */
  .optional-badge {
    display: inline-block;
    background: rgba(192,132,252,0.12);
    color: var(--purple);
    font-size: 0.65rem; font-weight: 600;
    padding: 2px 8px; border-radius: 10px;
    margin-left: 6px; vertical-align: middle;
  }

  /* ── Password strength ── */
  .strength-bar { display: flex; gap: 4px; margin-top: 6px; }
  .strength-seg { flex: 1; height: 3px; border-radius: 2px; background: #f0e8ff; transition: background 0.3s; }
  .strength-label { font-size: 0.7rem; color: #b497c8; margin-top: 3px; }

  /* ── Submit button ── */
  .btn-primary {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--rose) 0%, var(--purple) 100%);
    color: white; border: none; border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem; font-weight: 600;
    cursor: pointer; letter-spacing: 0.02em;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 6px 20px rgba(244,63,126,0.35);
    position: relative; overflow: hidden;
    margin-top: 4px;
  }
  .btn-primary::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent); }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(244,63,126,0.45); }

  /* ── Footer ── */
  .auth-footer { text-align: center; font-size: 0.83rem; color: #9b6fa5; padding: 4px 0 16px; }
  .auth-footer a { color: var(--purple); font-weight: 600; text-decoration: none; }
  .auth-footer a:hover { color: var(--rose); }

  /* ── Trust note ── */
  .trust-note {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(236,72,153,0.12);
    border-radius: 12px; padding: 10px 16px;
    font-size: 0.74rem; color: #7c5fa0;
    animation: fadeUp 0.6s ease 0.4s both;
  }

  @keyframes fadeDown { from{opacity:0;transform:translateY(-14px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp   { from{opacity:0;transform:translateY(14px)}  to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div class="shape shape-1"></div>
<div class="shape shape-2"></div>
<div class="shape shape-3"></div>

<div class="page">

  <!-- Brand -->
  <div class="brand">
    <div class="brand-shield">🛡️</div>
    <div class="brand-text">
      <h1>SheSecure</h1>
      <p>Your Safety, Always Connected</p>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-strip">
    <div class="prog-step active">
      <div class="prog-dot">1</div>Account
    </div>
    <div class="prog-step active">
      <div class="prog-dot">2</div>Contact
    </div>
    <div class="prog-step">
      <div class="prog-dot">3</div>Dashboard
    </div>
  </div>

  <form onsubmit="event.preventDefault(); registerUser();">

    <!-- Account card -->
    <div class="card">
      <div class="section-heading">
        <div class="section-icon">👤</div>
        <div>
          <h2>Your Account</h2>
          <p>Create your SheSecure identity</p>
        </div>
      </div>

      <div class="field">
        <label>Full Name</label>
        <div class="input-wrap">
          <i class="fas fa-user fi"></i>
          <input type="text" id="fullName" placeholder="e.g. Priya Sharma">
        </div>
        <div class="field-error" id="fullNameError"></div>
      </div>

      <div class="field">
        <label>Phone Number</label>
        <div class="input-wrap">
          <i class="fas fa-mobile-alt fi"></i>
          <input type="text" id="phone" placeholder="+91-9876543210">
        </div>
        <div class="field-error" id="phoneError"></div>
      </div>

      <div class="field">
        <label>Email Address</label>
        <div class="input-wrap">
          <i class="fas fa-envelope fi"></i>
          <input type="email" id="email" placeholder="your.email@example.com">
        </div>
        <div class="field-error" id="emailError"></div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock fi"></i>
          <input type="password" id="reg-password" placeholder="Min. 8 chars — uppercase, number" oninput="checkStrength(this.value)">
          <button type="button" class="eye-btn" id="eyeBtn" onclick="togglePassword()"><i class="fas fa-eye" id="eyeIcon"></i></button>
        </div>
        <div class="strength-bar">
          <div class="strength-seg" id="s1"></div>
          <div class="strength-seg" id="s2"></div>
          <div class="strength-seg" id="s3"></div>
          <div class="strength-seg" id="s4"></div>
        </div>
        <div class="strength-label" id="strengthLabel"></div>
        <div class="field-error" id="passwordError"></div>
      </div>
    </div>

    <!-- Trusted contact card -->
    <div class="card">
      <div class="section-heading">
        <div class="section-icon">🤝</div>
        <div>
          <h2>Trusted Contact <span class="optional-badge">Optional</span></h2>
          <p>They'll be alerted if you're in danger</p>
        </div>
      </div>

      <div class="field">
        <label>Contact Name</label>
        <div class="input-wrap">
          <i class="fas fa-heart fi"></i>
          <input type="text" id="contactName" placeholder="e.g. Mom, Sister, Best Friend">
        </div>
        <div class="field-error" id="contactNameError"></div>
      </div>

      <div class="field">
        <label>Contact Phone</label>
        <div class="input-wrap">
          <i class="fas fa-phone fi"></i>
          <input type="text" id="contactPhone" placeholder="+91-9876543210">
        </div>
        <div class="field-error" id="contactPhoneError"></div>
      </div>

      <button type="submit" class="btn-primary">
        <i class="fas fa-shield-alt" style="margin-right:8px;"></i>Create My Account
      </button>
    </div>

  </form>

  <div class="auth-footer">Already have an account? <a href="login.html">Login →</a></div>

  <div class="trust-note">
    🔒 Your data is encrypted & never shared with third parties
  </div>

</div>

<script>
  function togglePassword() {
    const f = document.getElementById('reg-password');
    const i = document.getElementById('eyeIcon');
    if (f.type === 'password') { f.type = 'text'; i.classList.replace('fa-eye','fa-eye-slash'); }
    else { f.type = 'password'; i.classList.replace('fa-eye-slash','fa-eye'); }
  }

  function checkStrength(val) {
    const segs = ['s1','s2','s3','s4'];
    const lbl  = document.getElementById('strengthLabel');
    let score  = 0;
    if (val.length >= 8)           score++;
    if (/[A-Z]/.test(val))         score++;
    if (/[0-9]/.test(val))         score++;
    if (/[^A-Za-z0-9]/.test(val))  score++;
    const colors = ['#f43f7e','#f97316','#f59e0b','#10b981'];
    const labels = ['Weak','Fair','Good','Strong 💪'];
    segs.forEach((id, i) => {
      document.getElementById(id).style.background = i < score ? colors[score-1] : '#f0e8ff';
    });
    lbl.textContent = val.length ? labels[score-1] || '' : '';
    lbl.style.color = score > 0 ? colors[score-1] : '#b497c8';
  }

  function setError(inputId, errorId, msg) {
    const el = document.getElementById(inputId);
    document.getElementById(errorId).textContent = msg;
    el.classList.add('error','shake');
    setTimeout(() => el.classList.remove('shake'), 350);
  }

  function clearErrors() {
    ['fullNameError','phoneError','emailError','passwordError','contactNameError','contactPhoneError']
      .forEach(id => document.getElementById(id).textContent = '');
    ['fullName','phone','email','reg-password','contactName','contactPhone']
      .forEach(id => document.getElementById(id).classList.remove('error'));
  }

  function registerUser() {
    clearErrors();
    const n  = document.getElementById('fullName').value.trim();
    const ph = document.getElementById('phone').value.trim();
    const em = document.getElementById('email').value.trim();
    const pw = document.getElementById('reg-password').value;
    const cn = document.getElementById('contactName').value.trim();
    const cp = document.getElementById('contactPhone').value.trim();

    let ok = true;
    const phoneRx = /^\+91[- ]?[0-9]{10}$/;
    const emailRx = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const passRx  = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

    if (n.length < 3)         { setError('fullName','fullNameError','Name must be at least 3 characters'); ok=false; }
    if (!phoneRx.test(ph))    { setError('phone','phoneError','Use format: +91-9876543210'); ok=false; }
    if (!emailRx.test(em))    { setError('email','emailError','Enter a valid email address'); ok=false; }
    if (!passRx.test(pw))     { setError('reg-password','passwordError','Min. 8 chars with uppercase & number'); ok=false; }
    if (cp && !phoneRx.test(cp)) { setError('contactPhone','contactPhoneError','Use format: +91-9876543210'); ok=false; }

    if (!ok) return;

    localStorage.setItem('userFullName', n);
    localStorage.setItem('userPhone', ph);
    localStorage.setItem('userEmail', em);
    localStorage.setItem('userPassword', pw);
    localStorage.setItem('trustedName', cn);
    localStorage.setItem('trustedPhone', cp);

    window.location.href = 'login.html';
  }
</script>
</body>
</html>
